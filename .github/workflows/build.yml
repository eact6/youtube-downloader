name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish release to GitHub Releases'
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: Compile and Publish
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install Dependencies
        run: npm ci

      # For a tag push (e.g. v1.1.1), build and publish directly to GitHub Releases.
      # For a push to main or workflow_dispatch, just build the exe without publishing, and upload it as a workflow artifact.
      - name: Build and Publish (Tags or Manual Publish)
        if: startsWith(github.ref, 'refs/tags/v') || inputs.publish == true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist -- --publish always

      - name: Build Only (Main branch & Manual runs)
        if: "!startsWith(github.ref, 'refs/tags/v') && inputs.publish != true"
        run: npm run dist -- --publish never

      # Upload the compiled exe as a workflow artifact for main branch pushes / manual runs
      - name: Upload Artifact
        if: "!startsWith(github.ref, 'refs/tags/v') && inputs.publish != true"
        uses: actions/upload-artifact@v4
        with:
          name: youtube-downloader-exe
          path: dist/*.exe
          if-no-files-found: error
